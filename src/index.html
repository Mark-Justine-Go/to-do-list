<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To do</title>
</head>
<body>
    <div id="menu">
        <h2>Menu</h2>
        <div id="date">
            <p>DATE</p>
            <div class="clickable" id="selected">
                <img src="./images/today.svg" alt="today" class="icon">
                <p>Today</p>
            </div>
            <div class="clickable">
                <img src="./images/calendar.svg" alt="calendar" class="icon">
                <p>Calendar</p>
                <input type="date" id="calendar" name="calendar" style="display: none;">
            </div>
        </div>
        <div id="labels">
            <p>LABEL</p>
            <div id="addNewLabelButton">
                <img src="./images/add.svg" alt="add " class="icon">
                <p>Add new label</p>
            </div>
        </div>
        <div id="settings">
            <img src="./images/setting.svg" alt="setting" class="icon">
            <p>Setting</p>
        </div>
    </div>
    <div id="tasksContainer">
        <h1>Today</h1>
        <div id="tasksList">
            <div id="addNewTaskButton">
                <img src="./images/add.svg" alt="add task" class="icon">
                <p>Add new task</p>
            </div>
        </div>
    </div>
    <div id="addTaskModal" class="hidden">
        <div class="header">
            <h3>Add new task</h3>
            <img src="./images/close.svg" alt="close" class="icon closeButton" data-modal-id="addTaskModal">
        </div>
        <form action="#">
            <div>
                <label for="taskName">Task Name</label>
                <input type="text">
            </div>
            <div>
                <label for="taskDescription">Task Description</label>
                <textarea name="taskDescription" id="taskDescription" ></textarea>
            </div>
            <div>
                <label for="">Labels</label>
                <div id="labelSelectionContainer"></div>
            </div>
            <div class="confirmButton">
                <button>Confirm</button>
            </div>
        </form>
    </div>
    <div id="addLabelModal" class="hidden">
        <div class="header">
            <h3>Add new label</h3>
            <img src="./images/close.svg" alt="close" class="icon closeButton" data-modal-id="addLabelModal">
        </div>
        <form action="#">
            <div>
                <label for="labelName">Label Name</label>
                <input type="text" id="labelName">
            </div>
            <div>
                <label for="labelColor">Label Color</label>
                <input type="color" name="labelColor" id="labelColor">
            </div>
            <div class="confirmButton">
                <button>Confirm</button>
            </div>
        </form>
    </div>
</body>
</html>
