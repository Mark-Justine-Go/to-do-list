<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To do</title>
</head>
<body>
    <div id="menu">
        <h2>Menu</h2>
        <div id="date">
            <p>DATE</p>
            <div class="clickable">
                <img src="./images/today.svg" alt="today" class="icon">
                <p>Today</p>
            </div>
            <div class="clickable">
                <img src="./images/calendar.svg" alt="calendar" class="icon">
                <p>Calendar</p>
                <input type="date" id="calendar" name="calendar" style="display: none;">
            </div>
        </div>
        <div id="labels">
            <p>LABEL</p>
            <div class="clickable">
                <img src="./images/add.svg" alt="add " class="icon">
                <p>Add new label</p>
            </div>
        </div>
        <div id="settings" class="clickable">
            <img src="./images/setting.svg" alt="setting" class="icon">
            <p>Setting</p>
        </div>
    </div>
    <div id="mainContainer"></div>
</body>
</html>
